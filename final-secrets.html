
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 32px 16px 48px;
    min-height: 100vh;
  }
  svg { display: block; }
  .footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    border-top: 1px solid #333;
    background: #1a1a1a;
    text-align: center;
    font-size: 11px;
    color: #555;
    font-family: -apple-system,"Segoe UI",system-ui,sans-serif;
    padding: 6px 0;
  }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" font-family="-apple-system,'Segoe UI',system-ui,sans-serif" font-size="13">

  <rect width="980" height="460" fill="#1a1a1a"></rect>

  
  <rect x="10" y="10" width="960" height="80" rx="6" fill="#2a2a2a" stroke="#444" stroke-width="1"></rect>
  <text x="490" y="32" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="600">Deploy time — Deployer creates</text>

  
  
  <rect x="80" y="44" width="220" height="36" rx="4" fill="#111" stroke="#555" stroke-width="1.5"></rect>
  <text x="190" y="67" text-anchor="middle" fill="#e0e0e0" font-weight="600">digitize-kek</text>

  
  <rect x="380" y="44" width="220" height="36" rx="4" fill="#111" stroke="#555" stroke-width="1.5"></rect>
  <text x="490" y="67" text-anchor="middle" fill="#e0e0e0" font-weight="600">digitize-tls-cert</text>

  
  <rect x="680" y="44" width="220" height="36" rx="4" fill="#111" stroke="#555" stroke-width="1.5"></rect>
  <text x="790" y="67" text-anchor="middle" fill="#e0e0e0" font-weight="600">digitize-tls-key</text>

  <defs>
    <marker id="ah">
      <path d="M0,0 L8,3 L0,6 Z" fill="#888"></path>
    </marker>
  </defs>

  
  <line x1="190" y1="80" x2="190" y2="132" stroke="#888" stroke-width="1.4" marker-end="url(#ah)"></line>
  <line x1="490" y1="80" x2="490" y2="132" stroke="#888" stroke-width="1.4" marker-end="url(#ah)"></line>
  <line x1="790" y1="80" x2="790" y2="132" stroke="#888" stroke-width="1.4" marker-end="url(#ah)"></line>

  
  
  <rect x="90" y="128" width="200" height="18" rx="3" fill="#333"></rect>
  <text x="190" y="141" text-anchor="middle" fill="#ccc" font-size="11">/run/secrets/digitize_kek</text>

  
  <rect x="375" y="128" width="228" height="18" rx="3" fill="#333"></rect>
  <text x="490" y="141" text-anchor="middle" fill="#ccc" font-size="11">/run/secrets/tls/cert.pem</text>

  
  <rect x="670" y="128" width="240" height="18" rx="3" fill="#333"></rect>
  <text x="790" y="141" text-anchor="middle" fill="#ccc" font-size="11">/run/secrets/tls/key.pem</text>

  
  <rect x="10" y="156" width="960" height="140" rx="6" fill="#2a2a2a" stroke="#555" stroke-width="1"></rect>
  <text x="490" y="175" text-anchor="middle" fill="#e0e0e0" font-size="12">Digitize pod — mounts all three at /run/secrets/</text>

  
  <line x1="190" y1="146" x2="190" y2="184" stroke="#888" stroke-width="1.4" marker-end="url(#ah)"></line>
  <line x1="490" y1="146" x2="490" y2="184" stroke="#888" stroke-width="1.4" marker-end="url(#ah)"></line>
  <line x1="790" y1="146" x2="790" y2="184" stroke="#888" stroke-width="1.4" marker-end="url(#ah)"></line>

  
  <rect x="80" y="184" width="220" height="96" rx="4" fill="#111" stroke="#555" stroke-width="1.5"></rect>
  <text x="190" y="208" text-anchor="middle" fill="#e0e0e0">Sync worker: decrypt the</text>
  <text x="190" y="224" text-anchor="middle" fill="#e0e0e0">SSH private key</text>

  <rect x="370" y="184" width="540" height="96" rx="4" fill="#111" stroke="#555" stroke-width="1.5"></rect>
  <text x="640" y="218" text-anchor="middle" fill="#e0e0e0">Uvicorn TLS: prove my</text>
  <text x="640" y="236" text-anchor="middle" fill="#e0e0e0">identity over HTTPS</text>

  
  <line x1="190" y1="280" x2="190" y2="332" stroke="#888" stroke-width="1.4" marker-end="url(#ah)"></line>
  <line x1="640" y1="280" x2="640" y2="332" stroke="#888" stroke-width="1.4" marker-end="url(#ah)"></line>

  
  <rect x="80" y="328" width="220" height="34" rx="3" fill="#333"></rect>
  <text x="190" y="343" text-anchor="middle" fill="#ccc" font-size="11">stored encrypted copy in</text>
  <text x="190" y="357" text-anchor="middle" fill="#ccc" font-size="11">catalog DB</text>

  <rect x="460" y="328" width="360" height="34" rx="3" fill="#333"></rect>
  <text x="640" y="343" text-anchor="middle" fill="#ccc" font-size="11">SHA-256 fingerprint</text>
  <text x="640" y="357" text-anchor="middle" fill="#ccc" font-size="11">stored in catalog DB</text>

  
  <rect x="10" y="372" width="960" height="76" rx="6" fill="#2a2a2a" stroke="#555" stroke-width="1"></rect>
  <text x="490" y="392" text-anchor="middle" fill="#e0e0e0" font-size="12">Catalog — reads indirectly</text>

  
  <line x1="190" y1="362" x2="190" y2="402" stroke="#888" stroke-width="1.4" marker-end="url(#ah)"></line>
  <line x1="640" y1="362" x2="640" y2="402" stroke="#888" stroke-width="1.4" marker-end="url(#ah)"></line>

  
  <rect x="80" y="398" width="220" height="40" rx="4" fill="#111" stroke="#555" stroke-width="1.5"></rect>
  <text x="190" y="416" text-anchor="middle" fill="#e0e0e0" font-size="12">Go: decrypt &amp; deliver</text>
  <text x="190" y="430" text-anchor="middle" fill="#e0e0e0" font-size="12">private key to sync worker</text>

  <rect x="460" y="398" width="360" height="40" rx="4" fill="#111" stroke="#555" stroke-width="1.5"></rect>
  <text x="640" y="416" text-anchor="middle" fill="#e0e0e0" font-size="12">Go: verify I am really</text>
  <text x="640" y="430" text-anchor="middle" fill="#e0e0e0" font-size="12">talking to the right pod</text>

</svg>

<p class="footer">Made with IBM Bob</p>
</body>
</html>
