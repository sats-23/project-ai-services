apiVersion: apps/v1
kind: Deployment
metadata:
  name: "similarity-api"
  labels:
    ai-services.io/application: {{ .Release.Name }}
    ai-services.io/template: {{ .Chart.Name }}
    ai-services.io/version: {{ default .Chart.AppVersion | quote }}
spec:
  replicas: 1
  selector:
    matchLabels:
      ai-services.io/application: {{ .Release.Name }}
      ai-services.io/component: similarity-api
  template:
    metadata:
      labels:
        ai-services.io/application: {{ .Release.Name }}
        ai-services.io/template: {{ .Chart.Name }}
        ai-services.io/component: similarity-api
        ai-services.io/version: {{ default .Chart.AppVersion | quote }}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: similarity-api
          image: "{{ .Values.similarity.image }}"
          command:
            - "/var/venv/bin/python"
            - "-m"
            - "uvicorn"
            - "app:app"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "7000"
            - "--loop"
            - "uvloop"
            - "--http"
            - "httptools"
          env:
            - name: PORT
              value: "7000"
            - name: EMB_ENDPOINT
              value: http://embedding-predictor:8080
            - name: EMB_MODEL
              value: {{ .Values.embedding.model.name | quote }}
            - name: EMB_MAX_MODEL_LEN
              value: {{ .Values.embedding.model.maxModelLen | quote }}
            - name: RERANKER_ENDPOINT
              value: http://reranker-predictor:8000
            - name: RERANKER_MODEL
              value: {{ .Values.reranker.model.name | quote }}
            - name: OPENSEARCH_HOST
              value: "opensearch"
            - name: OPENSEARCH_PORT
              value: "9200"
            - name: OPENSEARCH_DB_PREFIX
              value: "RAG_DB"
            - name: OPENSEARCH_INDEX_NAME
              value: "RAG_INDEX"
            - name: OPENSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: "opensearch-credentials"
                  key: username
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "opensearch-credentials"
                  key: password
            - name: LOG_LEVEL
              value: "{{ .Values.similarity.log_level }}"
            - name: NUM_CHUNKS_POST_SEARCH
              value: "{{ .Values.chatbot.numChunksPostSearch }}"
          ports:
            - containerPort: 7000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 7000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 7000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
