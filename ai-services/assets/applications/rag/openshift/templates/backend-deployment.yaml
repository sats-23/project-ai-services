apiVersion: apps/v1
kind: Deployment
metadata:
  name: "backend"
  labels:
    ai-services.io/application: {{ .Release.Name }}
    ai-services.io/template: {{ .Chart.Name }}
    ai-services.io/version: {{ default .Chart.AppVersion | quote }}
spec:
  replicas: 1
  selector:
    matchLabels:
      ai-services.io/application: {{ .Release.Name }}
      ai-services.io/component: backend
  template:
    metadata:
      labels:
        ai-services.io/application: {{ .Release.Name }}
        ai-services.io/template: {{ .Chart.Name }}
        ai-services.io/component: backend
        ai-services.io/version: {{ default .Chart.AppVersion | quote }}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: server
          image: "{{ .Values.backend.image }}"
          command:
            - "/var/venv/bin/python"
            - "-m"
            - "uvicorn"
            - "app:app"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "5000"
            - "--loop"
            - "uvloop"
            - "--http"
            - "httptools"
          env:
            - name: EMB_ENDPOINT
              value: http://embedding-predictor:8080
            - name: EMB_MODEL
              value: {{ .Values.embedding.model.name | quote }}
            - name: EMB_MAX_MODEL_LEN
              value: {{ .Values.embedding.model.maxModelLen | quote }}
            - name: LLM_ENDPOINT
              value: http://instruct-predictor:8000
            - name: LLM_MODEL
              value: {{ .Values.instruct.model.name | quote }}
            - name: LLM_MAX_MODEL_LEN
              value: {{ .Values.instruct.model.maxModelLen | quote }}
            - name: LLM_MAX_BATCH_SIZE
              value: {{ .Values.instruct.model.maxBatchSize | quote }}
            - name: RERANKER_ENDPOINT
              value: http://reranker-predictor:8000
            - name: RERANKER_MODEL
              value: {{ .Values.reranker.model.name | quote }}
            - name: OPENSEARCH_HOST
              value: "opensearch"
            - name: OPENSEARCH_PORT
              value: "9200"
            - name: OPENSEARCH_DB_PREFIX
              value: "RAG_DB"
            - name: OPENSEARCH_INDEX_NAME
              value: "RAG_INDEX"
            - name: OPENSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: "opensearch-credentials"
                  key: username
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "opensearch-credentials"
                  key: password
            - name: OPENSEARCH_NUM_SHARDS
              value: "{{ .Values.opensearch.numShards }}"
            - name: LOG_LEVEL
              value: "{{ .Values.backend.log_level }}"
            - name: CHATBOT_SEARCH_MODE
              value: "{{ .Values.chatbot.searchMode }}"
            - name: CHATBOT_NUM_CHUNKS_POST_RERANKER
              value: "{{ .Values.chatbot.numChunksPostReranker }}"
            - name: CHATBOT_RERANK
              value: "{{ .Values.chatbot.rerank }}"
            {{- if .Values.backend.conversationalRagInitialSystemMessage }}
            - name: CHATBOT_CONVERSATIONAL_RAG_INITIAL_SYSTEM_MESSAGE
              value: "{{ .Values.backend.conversationalRagInitialSystemMessage }}"
            {{- end }}
          ports:
            - containerPort: 5000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "1Gi"
