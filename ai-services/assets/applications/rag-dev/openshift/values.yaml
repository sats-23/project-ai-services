ui:
  # @hidden
  image: icr.io/ai-services-cicd/chatbot-ui:v0.0.46

backend:
  # @hidden
  image: icr.io/ai-services-cicd/chatbot-service:v0.0.21
  # @hidden
  log_level: "INFO"
  # @description Custom initial system prompt for conversational RAG. Leave empty to use default. Must be at least 10 characters.
  systemPrompt: ""

summarize:
  # @hidden
  image: icr.io/ai-services-cicd/summarize-service:v0.0.14
  # @hidden
  log_level: "INFO"
  # @description Database name for the SUMMARIZE service. Default is "summarize_metadata".
  database: "summarize_metadata"

similarity:
  # @hidden
  image: icr.io/ai-services-cicd/similarity-service:v0.0.13
  # @hidden
  log_level: "INFO"

digitize:
  # @hidden
  image: icr.io/ai-services-cicd/digitize-service:v0.0.28
  # @hidden
  log_level: "INFO"
  # @description Database name for the DIGITIZE service. Default is "digitize_metadata".
  database: "digitize_metadata"

digitizeUi:
  # @hidden
  image: icr.io/ai-services-cicd/digitize-ui:v0.0.26

instruct:
  # @description API key for vLLM instruct service authentication. If empty, authentication is disabled. Provide a key to enable authentication.
  apiKey: ""
  # @hidden
  storageUri: hf://ibm-granite/granite-3.3-8b-instruct
  model:
    # @hidden
    name: ibm-granite/granite-3.3-8b-instruct
    # @hidden
    maxModelLen: 32768
    # @hidden
    maxBatchSize: 32

embedding:
  # @hidden
  storageUri: hf://ibm-granite/granite-embedding-278m-multilingual
  model:
    # @hidden
    name: ibm-granite/granite-embedding-278m-multilingual
    # @hidden
    maxModelLen: 512

reranker:
  # @hidden
  storageUri: hf://BAAI/bge-reranker-v2-m3
  model:
    # @hidden
    name: BAAI/bge-reranker-v2-m3

chatbot:
  # @description Search mode for similarity search. Options: "dense" (cosine similarity), "sparse" (BM25), "hybrid" (both). Default is "dense".
  searchMode: "hybrid"
  # @description Number of document chunks to keep after reranking. Default is 3.
  numChunksPostReranker: 3
  # @description Enable reranking of search results using the reranker model. Default is true.
  rerank: true

ingest:
  # @hidden
  log_level: "INFO"

opensearch:
  # @hidden
  image: icr.io/ppc64le-oss/opensearch-ppc64le:3.5.0
  # @description Sets the memory limit for the Opensearch service(Default: 8Gi). Override by passing a value with a unit suffix (e.g., Mi, Gi).
  memoryLimit: 8Gi
  # @description Sets the storage limit for the Opensearch service(Default: 10Gi). Override by passing a value with a unit suffix (e.g., Mi, Gi).
  storage: 10Gi
  # @description Number of OpenSearch pods (nodes) in cluster; increase for adding additional OpenSearch nodes (Default: 1).
  replicas: 1
  # @description Number of primary shards for index distribution (Default: 1).
  numShards: 1
  auth:
    username: "admin"
    # @description Password for OpenSearch authentication. Must be at least 15 characters and contain at least one uppercase letter, one lowercase letter, one digit, and one special character. Avoid common words, predictable patterns, or dictionary terms. Use this to override the default admin password.
    password: "AiServices@12345"

postgres:
  # @hidden
  image: icr.io/ai-services-cicd/postgres:18-3
  # @description Sets the storage limit for the PostgreSQL service (Default: 5Gi). Override by passing a value with a unit suffix (e.g., Mi, Gi).
  storage: 5Gi
  # @description Password for PostgreSQL default 'postgres' user authentication. Must be at least 8 characters. Use this to override the default password.
  password: "Aiservicesdb@1234"
