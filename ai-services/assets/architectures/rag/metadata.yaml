# Architecture identification
id: rag
name: "Digital Assistant"
description: "Production-ready tools that help users complete tasks and access information through conversation or commands. Assistants integrate multiple services for complex use cases and support retrieval-augmented generation (RAG)."
version: "1.0.0"
type: architecture

# Certification and support
certified_by: "IBM"
runtimes:
  - podman

# Global components shared across all services
# These components are deployed once and reused by all services
global_components:
  - type: vector_store
  - type: embedding

# Service composition (version is optional, uses latest if not specified)
services:
  - id: chat
    version: ">=1.0.0"

  - id: digitize
    version: ">=1.0.0"

  - id: similarity
    version: ">=1.0.0"

  - id: summarize
    version: ">=1.0.0"
    optional: true

about:
  - title: "Services"
    values:
      - "Digitize Documents"
      - "Find Similar Items"
      - "Question and Answer"
      - "Summarize"

  - title: "Use case domains"
    sections:
      - title: "Agriculture"
        values:
          - "Agriculture assistant"
      - title: "Banking"
        values:
          - "Analyst assistant"
          - "Financial documents assistant"
          - "Open account agent"
      - title: "Enterprise resource planning"
        values:
          - "BI assistant"
          - "Invoice matching assistant"
          - "Order processing assistant"
      - title: "Insurance"
        values:
          - "Claims & policy management agent"
      - title: "IT operations"
        values:
          - "Invoice matching assistant"
      - title: "Public sector"
        values:
          - "Private documents assistant"
          - "Product sales assistant"
      - title: "Professional services"
        values:
          - "Conference slide search"
      - title: "Real estate"
        values:
          - "Real estate assistant"

  - title: "Minimum resource allocation"
    sections:
      - title: "Required cores"
        value: "15 - 20"
      - title: "Required memory"
        value: "256 - 300GB"
      - title: "Required Spyre cards"
        value: "4 cards"

  - title: "Code and architecture"
    sections:
      - title: "Source code"
        ctaLabel: "View source code"
        url: "https://github.com/IBM/project-ai-services"
      - image:
          source: "images/ragArchDiagram.webp"

  - title: "Demos and prototypes"
    sections:
      - title: "Retrieval-Augmented Generation (RAG)"
        description: "Discover the architecture behind this pre-built digital assistant"
        ctaLabel: "Watch"
        url: "https://github.com/user-attachments/assets/958980a7-f653-4474-84a7-28d657b5f7d1"

