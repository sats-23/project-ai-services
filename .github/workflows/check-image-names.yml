name: Check Image Names

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'services/*'
      - 'ui/*'
      - 'ai-services/assets/**/values.yaml'
      - .github/workflows/check-image-names.yml
      - .github/workflows/bump-makefile-version.yml
      - .github/scripts/check_image_names.py
    branches:
      - main

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Verify image names and versions are consistent
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run image name consistency check
        run: python3 .github/scripts/check_image_names.py

