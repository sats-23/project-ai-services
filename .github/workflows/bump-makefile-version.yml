name: Check Makefile Version Bump

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'services/chatbot/**'
      - 'services/digitize/**'
      - 'services/similarity/**'
      - 'services/summarize/**'
      - 'images/**'
      - 'ui/**'
      - 'ai-services/**'
      - '.github/workflows/bump-makefile-version.yml'
      - '.github/scripts/check_make_version_tag.py'
    branches:
      - main

jobs:
  check-version-bump:
    name: Check Makefile Version Bumps
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Check version bumps for all components
        run: |
          python3 .github/scripts/check_makefile_version_bump.py ${{ github.base_ref }}

