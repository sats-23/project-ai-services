name: Upload Release Asset

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build all platforms
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - run: go version

      - name: Build Go binaries for all platforms (cross-compilation)
        working-directory: ai-services
        run: |
          make binaries

      - name: Archive all binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ai-services-binaries
          path: ai-services/bin/ai-services-*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ success() }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          name: ai-services-binaries
          path: ./release-assets

      - name: Get the target release version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: true
          prerelease: true
          generate_release_notes: true
          body: |
            ## AI Services Release ${{ steps.get_version.outputs.VERSION }}
            
            ### 📦 Installation
            
            For detailed platform-specific installation instructions, see the [Installation Guide](https://github.com/IBM/project-ai-services/blob/main/docs/INSTALLATION.md).
            
            ### Binaries
            This release includes pre-built binaries for multiple platforms:
            
            **macOS:**
            - `ai-services-darwin-amd64` - Intel-based Macs
            - `ai-services-darwin-arm64` - Apple Silicon Macs (M1/M2/M3/M4 and later)
            
            **Linux:**
            - `ai-services-linux-amd64` - x86_64 Linux
            - `ai-services-linux-ppc64le` - PowerPC 64-bit Little Endian Linux (Podman runtime supported)
            
            ### Platform Support
            - **Podman runtime**: Only supported on `linux/ppc64le`
            - **OpenShift runtime**: Supported on all platforms (Client)
            
            ### 🔐 Signature Verification
            
            All binaries and container images are signed with Cosign for enhanced security and supply chain integrity.
            
            📖 **See the [Installation Guide](https://github.com/IBM/project-ai-services/blob/main/docs/INSTALLATION.md) for:**
            - Binary signature verification instructions
            - Container image signature verification
          files: |
            ./release-assets/*
